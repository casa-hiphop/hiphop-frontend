name: CI/CD Pipeline with Multi-Host SSH

# Define quando o workflow será disparado
on:
  push:
    branches:
      - main

# Variáveis de ambiente globais
env:
  PROJECT_NAME: hiphop-frontend
  CONTAINER_NAME: hiphop-frontend
  APP_PORT: 3000

jobs:
  # Job para testes e validação de código
  code-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar ambiente
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

  # Job para build, push no Docker Hub e deploy via SSH
  deploy:
    needs: code-validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        if: github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push da imagem para o Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.PROJECT_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.PROJECT_NAME }}:${{ github.sha }}

      - name: Configurar SSH para Produção
        if: github.ref == 'refs/heads/main'
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_PRODUCTION }}

      - name: Configurar known_hosts para Produção
        if: github.ref == 'refs/heads/main'
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST_PRODUCTION }} >> ~/.ssh/known_hosts

      - name: Deploy para Produção
        if: github.ref == 'refs/heads/main'
        run: |
          ssh ${{ secrets.SERVER_USER_PRODUCTION }}@${{ secrets.SERVER_HOST_PRODUCTION }} "
            IMAGE_NAME='${{ secrets.DOCKERHUB_USERNAME }}/${{ env.PROJECT_NAME }}:latest'
            echo '${{ secrets.DOCKERHUB_TOKEN }}' | docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' --password-stdin
            docker pull \$IMAGE_NAME
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart always \
              -p ${{ env.APP_PORT }}:${{ env.APP_PORT }} \
              \$IMAGE_NAME
          "
